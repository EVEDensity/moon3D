<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Three.js 月球预览</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    color: #cfd8e8;
  }
  #app {
    position: fixed;
    inset: 0;
  }
  canvas {
    display: block;
  }

  /* 顶部信息栏 */
  .hud {
    position: fixed;
    top: 16px;
    left: 16px;
    z-index: 10;
    padding: 10px 14px;
    background: rgba(10, 14, 24, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(140, 180, 240, 0.18);
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.6;
    user-select: none;
    pointer-events: none;
  }
  .hud .title {
    font-size: 14px;
    color: #a8c1ff;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .hud .sub {
    opacity: 0.75;
  }

  /* 加载提示 */
  .loader {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    z-index: 20;
    transition: opacity 0.6s ease;
  }
  .loader.hidden {
    opacity: 0;
    pointer-events: none;
  }
  .loader .ring {
    width: 56px;
    height: 56px;
    border: 2px solid rgba(168, 193, 255, 0.2);
    border-top-color: #a8c1ff;
    border-radius: 50%;
    margin: 0 auto 14px;
    animation: spin 1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader .text { font-size: 13px; opacity: 0.8; letter-spacing: 1px; }

  /* 控制面板 */
  .panel {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 10;
    padding: 12px 14px;
    background: rgba(10, 14, 24, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(140, 180, 240, 0.18);
    border-radius: 10px;
    width: 220px;
    font-size: 12px;
    user-select: none;
  }
  .panel h3 {
    margin: 0 0 10px 0;
    font-size: 12px;
    color: #a8c1ff;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .row { margin-bottom: 8px; }
  .row label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    opacity: 0.85;
  }
  .row label span:last-child {
    color: #a8c1ff;
    font-variant-numeric: tabular-nums;
  }
  input[type="range"] {
    width: 100%;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: rgba(140, 180, 240, 0.18);
    border-radius: 2px;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 12px;
    height: 12px;
    background: #a8c1ff;
    border-radius: 50%;
    cursor: pointer;
  }
  input[type="range"]::-moz-range-thumb {
    width: 12px;
    height: 12px;
    background: #a8c1ff;
    border: none;
    border-radius: 50%;
    cursor: pointer;
  }
  .btns { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-top: 10px; }
  .btns button {
    padding: 6px 8px;
    background: rgba(140, 180, 240, 0.1);
    border: 1px solid rgba(140, 180, 240, 0.2);
    color: #cfd8e8;
    border-radius: 6px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btns button:hover { background: rgba(140, 180, 240, 0.2); }
  .btns button.active { background: rgba(168, 193, 255, 0.25); border-color: #a8c1ff; color: #fff; }

  /* 错误提示 */
  .err {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 30;
    background: rgba(40, 10, 10, 0.85);
    border: 1px solid rgba(255, 100, 100, 0.4);
    color: #ffb0b0;
    padding: 16px 22px;
    border-radius: 10px;
    font-size: 13px;
    max-width: 360px;
    line-height: 1.6;
    text-align: center;
  }
  .err strong { color: #ff8080; }

  /* 底部提示 */
  .hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    padding: 8px 14px;
    background: rgba(10, 14, 24, 0.55);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(140, 180, 240, 0.18);
    border-radius: 999px;
    font-size: 12px;
    color: #8fa3c4;
    user-select: none;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="app"></div>

<div class="hud">
  <div class="title">🌙 MOON</div>
  <div class="sub" id="status">初始化场景…</div>
</div>

<div class="loader" id="loader">
  <div class="ring"></div>
  <div class="text" id="loaderText">加载月球模型…</div>
</div>

<div class="panel">
  <h3>控制台</h3>
  <div class="row">
    <label><span>光源强度</span><span id="lightVal">1.2</span></label>
    <input id="light" type="range" min="0" max="3" step="0.1" value="1.2" />
  </div>
  <div class="row">
    <label><span>环境光</span><span id="ambVal">0.25</span></label>
    <input id="amb" type="range" min="0" max="2" step="0.05" value="0.25" />
  </div>
  <div class="row">
    <label><span>背景星尘</span><span id="starVal">1.0</span></label>
    <input id="star" type="range" min="0" max="2" step="0.1" value="1.0" />
  </div>
  <div class="btns">
    <button id="btnAuto" class="active">自转</button>
    <button id="btnWire">线框</button>
    <button id="btnReset">复位</button>
    <button id="btnFit">居中</button>
  </div>
</div>

<div class="hint">🖱 拖拽旋转 · 滚轮缩放 · 右键平移</div>

<!-- importmap：让浏览器原生识别 three 与扩展模块 -->
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

/* ===========================================================
 *  1. 场景 / 相机 / 渲染器
 * =========================================================== */
const container = document.getElementById('app');
const statusEl  = document.getElementById('status');
const loaderEl  = document.getElementById('loader');
const loaderText = document.getElementById('loaderText');

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05070d);

const camera = new THREE.PerspectiveCamera(
  50,
  window.innerWidth / window.innerHeight,
  0.01,
  100
);
camera.position.set(2.2, 1.4, 3.0);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
container.appendChild(renderer.domElement);

/* ===========================================================
 *  2. 环境贴图（让模型 PBR 材质正确显示）
 * =========================================================== */
const pmrem = new THREE.PMREMGenerator(renderer);
scene.environment = pmrem.fromScene(new RoomEnvironment(), 0.04).texture;

/* ===========================================================
 *  3. 光照
 * =========================================================== */
const ambient = new THREE.AmbientLight(0x6b7a99, 0.25);
scene.add(ambient);

const sun = new THREE.DirectionalLight(0xfff4e2, 1.2);
sun.position.set(5, 3, 4);
scene.add(sun);

const rim = new THREE.DirectionalLight(0x6688ff, 0.35);
rim.position.set(-4, -1, -3);
scene.add(rim);

/* ===========================================================
 *  4. 背景星尘
 * =========================================================== */
let starField;
function buildStars(density = 1) {
  if (starField) {
    scene.remove(starField);
    starField.geometry.dispose();
    starField.material.dispose();
  }
  const count = Math.floor(2000 * density);
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    const r = 40 + Math.random() * 30;
    const t = Math.random() * Math.PI * 2;
    const p = Math.acos(2 * Math.random() - 1);
    pos[i*3]   = r * Math.sin(p) * Math.cos(t);
    pos[i*3+1] = r * Math.cos(p);
    pos[i*3+2] = r * Math.sin(p) * Math.sin(t);
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    color: 0xcfd8ff,
    size: 0.08,
    sizeAttenuation: true,
    transparent: true,
    opacity: 0.9,
    depthWrite: false
  });
  starField = new THREE.Points(geo, mat);
  scene.add(starField);
}
buildStars(1);

/* ===========================================================
 *  5. 控制器
 * =========================================================== */
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 0.6;
controls.maxDistance = 20;
controls.target.set(0, 0, 0);

/* ===========================================================
 *  6. 加载 GLB 模型
 * =========================================================== */
let moon = null;
let autoRotate = true;
let wireframe = false;
let originalMaterials = new Map();

const gltfLoader = new GLTFLoader();
loaderText.textContent = '加载 moon.glb …';
statusEl.textContent  = '正在加载模型…';

gltfLoader.load(
  './moon.glb',
  (gltf) => {
    moon = gltf.scene;
    scene.add(moon);

    // 备份材质、归一化模型到视口中心
    moon.traverse((obj) => {
      if (obj.isMesh) {
        originalMaterials.set(obj.uuid, obj.material);
        obj.castShadow = false;
        obj.receiveShadow = false;
        if (obj.material) {
          obj.material.envMapIntensity = 1.0;
        }
      }
    });

    fitToView(moon);
    statusEl.textContent = '✅ 月球加载完成';
    loaderEl.classList.add('hidden');
  },
  (xhr) => {
    if (xhr.total) {
      const pct = (xhr.loaded / xhr.total * 100).toFixed(0);
      loaderText.textContent = `加载中 ${pct}%`;
    }
  },
  (err) => {
    console.error('GLB 加载失败：', err);
    statusEl.textContent = '❌ 模型加载失败';
    showError('未找到 <strong>moon.glb</strong>。<br>请确认它和 <strong>moon.html</strong> 在同一目录，然后通过本地服务器打开（不能直接双击 file://）。');
  }
);

/* ===========================================================
 *  7. 模型居中 / 复位
 * =========================================================== */
function fitToView(obj) {
  const box = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  obj.position.sub(center); // 居中到原点

  const maxDim = Math.max(size.x, size.y, size.z) || 1;
  const fov = camera.fov * (Math.PI / 180);
  let dist = (maxDim / 2) / Math.tan(fov / 2);
  dist *= 1.6;
  camera.position.set(dist * 0.7, dist * 0.45, dist * 0.95);
  camera.near = dist / 100;
  camera.far  = dist * 100;
  camera.updateProjectionMatrix();
  controls.target.set(0, 0, 0);
  controls.update();
}

function resetView() {
  if (!moon) return;
  fitToView(moon);
  autoRotate = true;
  btnAuto.classList.add('active');
}

/* ===========================================================
 *  8. UI 控件绑定
 * =========================================================== */
const lightEl = document.getElementById('light');
const lightVal = document.getElementById('lightVal');
lightEl.addEventListener('input', () => {
  const v = parseFloat(lightEl.value);
  sun.intensity = v;
  lightVal.textContent = v.toFixed(2);
});

const ambEl = document.getElementById('amb');
const ambVal = document.getElementById('ambVal');
ambEl.addEventListener('input', () => {
  const v = parseFloat(ambEl.value);
  ambient.intensity = v;
  ambVal.textContent = v.toFixed(2);
});

const starEl = document.getElementById('star');
const starVal = document.getElementById('starVal');
starEl.addEventListener('input', () => {
  const v = parseFloat(starEl.value);
  starVal.textContent = v.toFixed(1);
  buildStars(v);
});

const btnAuto = document.getElementById('btnAuto');
btnAuto.addEventListener('click', () => {
  autoRotate = !autoRotate;
  btnAuto.classList.toggle('active', autoRotate);
});

const btnWire = document.getElementById('btnWire');
btnWire.addEventListener('click', () => {
  wireframe = !wireframe;
  btnWire.classList.toggle('active', wireframe);
  if (moon) {
    moon.traverse((obj) => {
      if (obj.isMesh) {
        const orig = originalMaterials.get(obj.uuid);
        if (orig) {
          if (wireframe) {
            obj.material = orig.clone();
            obj.material.wireframe = true;
          } else {
            obj.material.dispose();
            obj.material = orig;
          }
        }
      }
    });
  }
});

document.getElementById('btnReset').addEventListener('click', () => {
  controls.reset();
  resetView();
});

document.getElementById('btnFit').addEventListener('click', resetView);

/* ===========================================================
 *  9. 错误提示
 * =========================================================== */
function showError(msg) {
  loaderEl.classList.add('hidden');
  const div = document.createElement('div');
  div.className = 'err';
  div.innerHTML = msg;
  document.body.appendChild(div);
}

/* ===========================================================
 *  10. 渲染循环
 * =========================================================== */
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();

  if (moon && autoRotate) {
    moon.rotation.y += dt * 0.15;
  }
  if (starField) {
    starField.rotation.y += dt * 0.005;
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();

/* ===========================================================
 *  11. 窗口自适应
 * =========================================================== */
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
